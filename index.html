<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPSC MCQ Bank</title>
  <link rel="manifest" href="/ppsc-mcq-bank2/manifest.json">
  <link rel="icon" href="/ppsc-mcq-bank2/icon-192.png">
  <link rel="apple-touch-icon" href="/ppsc-mcq-bank2/icon-192.png">
  <meta name="theme-color" content="#0F1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PPSC MCQs">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --bg: #0F1117;
      --surface: #1A1D26;
      --card: #21253A;
      --border: #2E3350;
      --accent: #4F8EF7;
      --accentDim: #1E3A6E;
      --green: #34D399;
      --greenDim: #064E3B;
      --red: #F87171;
      --redDim: #7F1D1D;
      --yellow: #FBBF24;
      --yellowDim: #4A3A0A;
      --purple: #A78BFA;
      --purpleDim: #352A5C;
      --text: #E8EAF0;
      --muted: #6B7280;
      --dim: #9CA3AF;
    }
    [data-theme="light"] {
      --bg: #F7F8FC;
      --surface: #FFFFFF;
      --card: #FFFFFF;
      --border: #E2E5EE;
      --accent: #3B6FE0;
      --accentDim: #E5EDFF;
      --green: #0F9D6B;
      --greenDim: #E3F7EE;
      --red: #E0473B;
      --redDim: #FDEAE8;
      --yellow: #C8860A;
      --yellowDim: #FCF3DC;
      --purple: #7C5CE0;
      --purpleDim: #EEE9FC;
      --text: #1A1D26;
      --muted: #8A8F9C;
      --dim: #5B6072;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--surface);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }
    .btn {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 10px 20px;
      font-size: 14px;
    }
    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.1);
    }
    .btn-ghost {
      background: transparent;
      color: var(--dim);
      padding: 8px 14px;
      font-size: 13px;
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-ghost.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accentDim);
    }
    .btn-danger {
      background: var(--red);
      color: #fff;
      padding: 8px 14px;
      font-size: 13px;
    }
    .btn-danger:hover:not(:disabled) {
      filter: brightness(1.1);
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      background: var(--accentDim);
      color: var(--accent);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    input, select, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
    }
    label.chk {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--dim);
    }
    .navbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0;
      padding: 8px 0;
      z-index: 1000;
    }
    .nav-item {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--dim);
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
      font-family: inherit;
    }
    .nav-item.active {
      color: var(--accent);
    }
    .nav-item:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="wrap" id="app"></div>
  <div class="navbar" id="navbar"></div>

  <script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/ppsc-mcq-bank2/sw.js', { scope: '/ppsc-mcq-bank2/' })
        .then(reg => console.log('✓ Service Worker registered'))
        .catch(err => console.log('✗ Service Worker registration failed:', err));
    }

    const STORAGE_KEY = "ppsc_mcq_bank_v1";
    const THEME_KEY = "ppsc_theme";

    let state = {
      bank: { questions: [], sessions: [], streak: { count: 0, lastDay: null } },
      view: "home",
      theme: "dark",
    };

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s == null ? "" : String(s);
      return d.innerHTML;
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.bank)); } catch (e) { console.error("save failed", e); }
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const b = JSON.parse(raw);
          b.questions = (b.questions || []).map(q => ({
            bookmarked: false, attempts: 0, correctCount: 0, difficulty: "medium",
            srsInterval: 0, srsEase: 2.5, srsReps: 0, dueAt: Date.now(), ...q
          }));
          if (!b.streak) b.streak = { count: 0, lastDay: null };
          state.bank = b;
        }
        const t = localStorage.getItem(THEME_KEY);
        if (t) state.theme = t;
      } catch (e) { console.error("load failed", e); }
    }

    function toggleTheme() {
      state.theme = state.theme === "dark" ? "light" : "dark";
      localStorage.setItem(THEME_KEY, state.theme);
      document.documentElement.setAttribute("data-theme", state.theme);
      render();
    }

    function render() {
      document.documentElement.setAttribute("data-theme", state.theme);
      const app = document.getElementById("app");
      const navbar = document.getElementById("navbar");

      let content = "";
      if (state.view === "home") {
        content = `
          <div style="padding-top:20px;">
            <div class="card" style="text-align:center;">
              <div style="font-size:48px;margin-bottom:12px;">📚</div>
              <div style="font-size:24px;font-weight:700;margin-bottom:8px;">PPSC MCQ Bank</div>
              <div style="font-size:13px;color:var(--muted);margin-bottom:24px;">Offline exam prep with mock tests</div>
              <button class="btn btn-primary" id="importBtn" style="width:100%;margin-bottom:8px;">📥 Import Questions</button>
              <button class="btn btn-primary" id="quizBtn" style="width:100%;margin-bottom:8px;background:var(--purple);">📝 Mock Test</button>
              <button class="btn btn-primary" id="statsBtn" style="width:100%;background:var(--green);">📊 Statistics</button>
              <div style="margin-top:24px;font-size:13px;color:var(--muted);">
                📦 Total: ${state.bank.questions.length} questions
              </div>
            </div>
          </div>
        `;
      } else if (state.view === "import") {
        content = `
          <div class="card">
            <div style="font-size:16px;font-weight:700;margin-bottom:16px;">📥 Import Questions</div>
            <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">Upload PDF files with PPSC questions. The app will extract MCQs automatically.</p>
            <input type="file" id="fileInput" multiple accept=".pdf" style="padding:16px;border:2px dashed var(--border);border-radius:8px;cursor:pointer;">
            <div id="status" style="margin-top:16px;font-size:13px;color:var(--muted);"></div>
          </div>
        `;
      } else if (state.view === "quiz") {
        content = `<div class="card" style="text-align:center;"><div style="padding:40px;"><div style="font-size:32px;margin-bottom:12px;">📝</div><div style="color:var(--muted);">Mock Test feature in development</div><div style="font-size:12px;color:var(--dim);margin-top:8px;">Add questions first via Import</div></div></div>`;
      } else if (state.view === "stats") {
        content = `<div class="card" style="text-align:center;"><div style="padding:40px;"><div style="font-size:32px;margin-bottom:12px;">📊</div><div style="color:var(--muted);">Statistics</div><div style="font-size:13px;color:var(--dim);margin-top:8px;">Questions stored: ${state.bank.questions.length}</div></div></div>`;
      }

      app.innerHTML = content;

      navbar.innerHTML = `
        <button class="nav-item ${state.view === "home" ? "active" : ""}" onclick="setView('home')">🏠 Home</button>
        <button class="nav-item ${state.view === "import" ? "active" : ""}" onclick="setView('import')">📥 Import</button>
        <button class="nav-item ${state.view === "quiz" ? "active" : ""}" onclick="setView('quiz')">📝 Test</button>
        <button class="nav-item ${state.view === "stats" ? "active" : ""}" onclick="setView('stats')">📊 Stats</button>
        <button class="nav-item" onclick="toggleTheme()">🌙</button>
      `;

      if (state.view === "home") {
        document.getElementById("importBtn").onclick = () => setView("import");
        document.getElementById("quizBtn").onclick = () => setView("quiz");
        document.getElementById("statsBtn").onclick = () => setView("stats");
      }

      if (state.view === "import") {
        document.getElementById("fileInput").onchange = (e) => {
          const files = Array.from(e.target.files).filter(f => f.name.toLowerCase().endsWith(".pdf"));
          if (files.length > 0) {
            document.getElementById("status").innerHTML = `✓ Ready to import ${files.length} PDF(s). Feature in development...`;
          }
        };
      }
    }

    function setView(view) {
      state.view = view;
      render();
    }

    load();
    render();
  </script>
</body>
</html>
